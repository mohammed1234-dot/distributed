<div class="login-wrapper">
  <div class="login-card">
    <div class="header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-input">
          <input [type]="showPassword ? 'text' : 'password'" 
                 formControlName="password" 
                 placeholder="••••••••">
          <button type="button" (click)="togglePassword()">👁️</button>
        </div>
      </div>

      <div class="options">
        <label class="checkbox">
          <input type="checkbox" formControlName="rememberMe"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn-signin">
        Sign In
      </button>
    </form>

    <div class="footer">
      Don't have an account? 
      <a routerLink="/sign-up" class="create-account-link">Create Account</a>
    </div>
  </div>
</div>
